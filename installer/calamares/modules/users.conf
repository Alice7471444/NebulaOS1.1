# Users module configuration
defaultGroups:
    - users
    - sudo
    - audio
    - video
    - plugdev
    - netdev
    - bluetooth
    - lpadmin

autologinGroup: autologin
doAutologin: false
sudoersGroup: sudo
setRootPassword: true
doReusePassword: true

passwordRequirements:
    nonempty: true
    minLength: 6
    maxLength: -1
    libpwquality:
        - minlen=6
        - minclass=1

allowWeakPasswords: false
allowWeakPasswordsDefault: false

userShell: /bin/bash
hostname:
    location: EtcFile
    writeHostsFile: true
    template: "nebulaos-${first}"
    forbidden_names: [ localhost ]
